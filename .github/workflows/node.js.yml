name: Node.js CI 

on:
  push:
    branches: [ "main", "gh-pages" ]
  pull_request:
    branches: [ "main", "gh-pages" ]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    defaults:
      run:
        working-directory: Frontend   # ✅ IMPORTANT FIX

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: Frontend/package-lock.json  # ✅ FIX

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build --if-present

    - name: Test project
      run: npm test --if-present

    - name: Deploy with gh-pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        npx gh-pages -d build \
          -u "github-actions-bot <support+actions@github.com>" \
          -r https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git