spring.application.name=HRMS
spring.config.import=optional:file:.env[.properties]

# Neon / PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:${NEON_DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Helps Hibernate work cleanly with SSL-backed Neon connections.
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:5}